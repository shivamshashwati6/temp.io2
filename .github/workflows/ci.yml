name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        cd api
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run server in background
      run: |
        cd api
        python -m uvicorn index:app --port 8000 > server.log 2>&1 &
        
        # Wait for server to be ready
        echo "Waiting for server to start..."
        for i in {1..20}; do
          if curl -s http://localhost:8000/api/health > /dev/null; then
            echo "Server is up!"
            break
          fi
          echo "Still waiting..."
          sleep 2
        done
        
    - name: Run tests
      run: |
        cd api
        python test_all.py || (cat server.log && exit 1)
  
  test-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: |
        cd frontend
        npm install
    
    - name: Build
      run: |
        cd frontend
        npm run build
    
    - name: Check build size
      run: |
        cd frontend
        du -sh dist/
